[supervisord]
nodaemon=true
logfile=/app/logs/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/app/logs
loglevel=info

[unix_http_server]
file=/var/run/supervisor.sock

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

# Example: Filesystem MCP Server
[program:mcp-filesystem]
command=npx -y @modelcontextprotocol/server-filesystem /tmp
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/logs/mcp-filesystem.log
stderr_logfile=/app/logs/mcp-filesystem-error.log

# Example: GitHub MCP Server
[program:mcp-github]
command=npx -y @modelcontextprotocol/server-github
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/logs/mcp-github.log
stderr_logfile=/app/logs/mcp-github-error.log
; Tokens should be provided via the container environment (.env).

# Context7 MCP Server (HTTP)
[program:mcp-context7]
command=npx -y @upstash/context7-mcp --transport http --port 8080
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/logs/mcp-context7.log
stderr_logfile=/app/logs/mcp-context7-error.log

# Microsoft Docs MCP Server (remote via mcp-remote)
[program:mcp-microsoft-docs]
command=npx -y mcp-remote https://learn.microsoft.com/api/mcp
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/logs/mcp-microsoft-docs.log
stderr_logfile=/app/logs/mcp-microsoft-docs-error.log

# Local system configuration MCP Server
[program:mcp-system-info]
command=python3 /app/mcp-servers/system-info/server.py
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/logs/mcp-system-info.log
stderr_logfile=/app/logs/mcp-system-info-error.log

# Tavily Expert MCP Server
[program:mcp-tavily-expert]
command=npx -y tavily-mcp
directory=/app
autostart=true
autorestart=true
stdout_logfile=/app/logs/mcp-tavily-expert.log
stderr_logfile=/app/logs/mcp-tavily-expert-error.log
; Requires TAVILY_API_KEY in the container environment (.env).
